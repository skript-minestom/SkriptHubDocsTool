import org.apache.tools.ant.filters.ReplaceTokens
import org.jetbrains.kotlin.gradle.dsl.JvmTarget

plugins {
    id 'java'
    id 'org.jetbrains.kotlin.jvm' version '2.3.0'
    id 'com.gradleup.shadow' version '9.4.0'
}

group = 'net.skripthub'
version = '1.14'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

kotlin {
    compilerOptions {
        jvmTarget = JvmTarget.JVM_25
    }
}

repositories {
    mavenCentral()
    maven { url = "https://repo.hypera.dev/snapshots/" }
    maven { url = 'https://maven.hapily.me/releases' }
    maven { url = 'https://maven.hapily.me/snapshots' }
}

dependencies {
    compileOnly "com.github.hapily04:skript-minestom:1.0.0-alpha.1"
    implementation 'org.jetbrains.kotlin:kotlin-stdlib'
}

processResources {
    inputs.property "version", project.version
    filesMatching('**/*.yml') {
        filter ReplaceTokens, tokens: ["version": project.version]
    }
}

shadowJar {
    relocate 'kotlin', 'net.skripthub.docstool.kotlin'
}